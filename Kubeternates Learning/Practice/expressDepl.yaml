apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-depl
spec:
  replicas: 4
  selector:
    matchLabels:
      appname: express-app
  template:
    metadata: 
      labels:
        appname: express-app
    spec:
      containers:
      - name: express-container
        image: mongo-express
        ports:
        - containerPort: 8081
        env:
        - name: ME_CONFIG_MONGODB_ADMINUSERNAME 
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: username
        - name: ME_CONFIG_MONGODB_ADMINPASSWORD 
          valueFrom: 
            secretKeyRef:
              name: mongo-secret
              key: password
        - name: ME_CONFIG_MONGODB_SERVER
          valueFrom:
            configMapKeyRef:
              name: exress-configmap
              key: database-url
---
apiVersion: v1
kind: Service
metadata: 
  name: express-service
spec:
  selector: 
    appname: express-app
  type: LoadBalancer
  ports:
    - protocol : TCP
      port : 8081
      targetPort: 8081 
      nodePort: 30000     
